<!-- Header fragment containing a Bootstrap navbar -->
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

            <!-- Brand / Home link -->
            <a class="navbar-brand" href="/">BookClub</a>

            <!-- Mobile menu toggle button -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navigation links -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- LEFT SIDE LINKS -->
                <ul class="navbar-nav me-auto">

                    <!-- About Us link -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/about}">About Us</a>
                    </li>

                    <!-- Contact Us link -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/contact}">Contact Us</a>
                    </li>

                    <!-- Wishlist link -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/wishlist}">Wishlist</a>
                    </li>

                </ul>

                <!-- CENTER: Logged in as -->
                <div class="nav navbar-nav mx-auto">
                    <div sec:authorize="isAuthenticated()">
                        Logged in as <strong sec:authentication="name"></strong>
                    </div>
                </div>

                <!-- RIGHT SIDE: Logout -->
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="/logout" th:href="@{/logout}" class="nav-link">Logout</a>
                    </li>
                </ul>

            </div>

        </div>
    </nav>
</header>
