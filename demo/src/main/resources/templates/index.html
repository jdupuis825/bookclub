<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BookClub | Welcome</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<!-- Insert header fragment -->
<div th:replace="~{fragments/header :: header}"></div>
<!-- Main content -->
<main class="container py-5">
    <h1 class="fw-light">Monthly Book Club</h1>

    <p class="text-muted">Select a book to view its details.</p>
    <div class="list-group">
        <!-- Loop through the list of books -->
        <div th:each="book : ${books}" class="list-group-item d-flex justify-content-between align-items-center">

            <div>
                <h5 th:text="${book.title}"></h5>
                <p class="mb-1" th:text="${book.description}"></p>
                <small th:text="'Pages: ' + ${book.numOfPages}"></small>
            </div>

            <!-- Link to the detail page -->
            <a th:href="@{/{id}(id=${book.isbn})}" class="btn btn-primary">
                View
            </a>
        </div>
    </div>
</main>
<!-- Insert footer and script fragments -->
<div th:insert="~{fragments/footer :: footer}"></div>
<div th:replace="fragments/scriptFooter :: scriptFooter"></div>
</body>
</html>
