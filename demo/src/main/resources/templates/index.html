<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>BookClub | Welcome</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<!-- Insert header fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Main content -->
<main class="container py-5">
    <h1 class="fw-light">Monthly Book Club</h1>

    <p class="text-muted">Select a book to view its details.</p>

    <div class="list-group">

        <!-- Loop through the list of books -->
        <div th:each="book : ${books}" class="list-group-item d-flex justify-content-between align-items-center">

            <div>
                <h5 th:text="${book.getTitle()}"></h5>

                <p class="card-text">
                    <span th:text="${book.getTitle()}"></span>
                    <br />
                    <small class="text-muted">
                        <em th:text="${book.getIsbn()}"></em>
                    </small>
                </p>

                <div class="d-flex justify-content-between align-items-center">
                    <div class="btn-group">
                        <a href="#" th:href="@{/id/{id}(id=${book.getIsbn()})}"

                           class="btn btn-sm btn-outline-secondary">View</a>

                        <a href="#" th:href="${book.getInfoUrl()}"
                           class="btn btn-sm btn-outline-secondary" target="_blank">Web Link</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

<!-- Insert footer and script fragments -->
<div th:insert="~{fragments/footer :: footer}"></div>
<div th:replace="fragments/scriptFooter :: scriptFooter"></div>

</body>
</html>
