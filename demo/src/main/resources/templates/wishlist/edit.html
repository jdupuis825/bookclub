<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Wishlist Item</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<p th:text="'Logged in as ' + ${#authentication.name}"></p>

<h2>Edit Wishlist Item</h2>

<form th:action="@{/wishlist/update}" th:object="${item}" method="post" class="mt-3">

    <!-- Hidden ID field -->
    <input type="hidden" th:field="*{id}" />

    <div class="mb-3">
        <label class="form-label">ISBN</label>
        <input type="text" class="form-control" th:field="*{isbn}" />
    </div>

    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" class="form-control" th:field="*{title}" />
    </div>

    <button type="submit" class="btn btn-primary">Update</button>

    <a href="/wishlist" class="btn btn-link">Return to wishlist</a>

</form>

</body>
</html>
