<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Wishlist Item</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>

<div class="container mt-4">
    <h1 class="mb-4">Edit Wishlist Item</h1>

    <form th:action="@{/wishlist/edit/{id}(id=${wishListItem.id})}"
          th:object="${wishListItem}" method="post">

        <div class="mb-3">
            <label class="form-label">ISBN</label>
            <input type="text" th:field="*{isbn}" class="form-control">
            <p class="text-danger" th:if="${#fields.hasErrors('isbn')}"
               th:errors="*{isbn}"></p>
        </div>

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control">
            <p class="text-danger" th:if="${#fields.hasErrors('title')}"
               th:errors="*{title}"></p>
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a th:href="@{/wishlist}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>

</body>
</html>
