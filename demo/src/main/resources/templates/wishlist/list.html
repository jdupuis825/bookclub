<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Wishlist</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>
<div class="py-5 container" style="width: 50%;">
    <h2 class="text-center">My Wishlist</h2>
    <br />

    <p class="text-center">
        <a href="/wishlist/new" th:href="@{/wishlist/new}"
           class="btn btn-outline-secondary text-center">
            New Wishlist Item
        </a>
    </p>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ISBN</th>
            <th>Title</th>
            <th>Functions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${items}">
            <td th:text="${item.isbn}"></td>
            <td th:text="${item.title}"></td>
            <td>
                <a th:href="@{'/wishlist/' + ${item.id}}"
                   class="btn btn-sm btn-warning">Edit</a>

                <a th:href="@{'/wishlist/remove/' + ${item.id}}"
                   class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
