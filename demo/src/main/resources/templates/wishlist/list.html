<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Wishlist</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>
<div class="py-5 container" style="width: 50%;">
    <h2 class="text-center">My Wishlist</h2>
    <br />

    <p class="text-center">
        <a href="/wishlist/new" th:href="@{/wishlist/new}"
           class="btn btn-outline-secondary text-center">
            New Wishlist Item
        </a>
    </p>

    <!-- Placeholder where JS will inject the table -->
    <div id="wishlist"></div>
</div>

<script>
    // HttpClient class (Step 6)
    class HttpClient {
        async get(url, params = "") {
            url = new URL(url);
            url.search = new URLSearchParams(params).toString();

            console.log(url.toString());

            const res = await fetch(url.toString(), {
                method: 'GET',
            });

            return res.json();
        }
    }

    // buildTable function (Step 6)
    function buildTable(books) {
        let tableString = '<table class="table table-striped table-bordered">';
        tableString += '<thead class="table-dark"><tr><th>ISBN</th><th>Title</th><th>Functions</th></tr></thead>';

        for (let book of books) {
            tableString += `
                <tr>
                    <td>${book.isbn}</td>
                    <td>${book.title}</td>
                    <td>
                        <a href="/wishlist/edit/${book.id}" class="btn btn-sm btn-warning">Edit</a>
                        <a href="/wishlist/delete/${book.id}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>`;
        }

        tableString += '</table>';
        return tableString;
    }

    // API call to load wishlist (Step 6)
    const http = new HttpClient();

    http.get('http://localhost:8080/api/wishlist')
        .then(res => {
            console.log(res);
            document.getElementById("wishlist").innerHTML = buildTable(res);
        })
        .catch(e => console.log(e));
</script>

</body>
</html>
