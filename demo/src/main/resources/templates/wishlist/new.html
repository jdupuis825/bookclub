<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Wishlist Item</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>

<div class="container mt-4">
    <h1>New Wishlist Item Form</h1>

    <form th:action="@{/wishlist}"
          th:object="${wishlistItem}"
          method="post">

        <!-- ISBN field -->
        <div class="mb-3">
            <label for="isbn" class="form-label">ISBN</label>
            <input type="text"
                   class="form-control"
                   id="isbn"
                   th:field="*{isbn}" />

            <small th:if="${#fields.hasErrors('isbn')}"
                   th:errors="*{isbn}"
                   style="color: red;"></small>
        </div>

        <!-- Title field -->
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text"
                   class="form-control"
                   id="title"
                   th:field="*{title}" />

            <small th:if="${#fields.hasErrors('title')}"
                   th:errors="*{title}"
                   style="color: red;"></small>
        </div>

        <!-- Buttons -->
        <a th:href="@{/wishlist}" class="btn btn-link">Return to wishlist</a>
        <button type="submit" class="btn btn-primary">Save</button>

    </form>
</div>

</body>
</html>
