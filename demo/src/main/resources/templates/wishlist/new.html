<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Wishlist Item</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>
<div class="container mt-4">

    <h1 class="mb-4">New Wishlist Item</h1>

    <form th:action="@{/wishlist/new}" th:object="${wishListItem}" method="post">

        <!-- ISBN -->
        <div class="mb-3">
            <label for="isbn" class="form-label">ISBN</label>
            <input type="text" id="isbn" class="form-control" th:field="*{isbn}">
            <p class="text-danger" th:if="${#fields.hasErrors('isbn')}"
               th:errors="*{isbn}"></p>
        </div>

        <!-- Title -->
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" id="title" class="form-control" th:field="*{title}">
            <p class="text-danger" th:if="${#fields.hasErrors('title')}"
               th:errors="*{title}"></p>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        <a class="btn btn-secondary" th:href="@{/wishlist}">Return to Wishlist</a>

    </form>

</div>
</body>
</html>
